name: Outfitters Quantum Tracker

on:
  workflow_dispatch:

  schedule:
    # Runs every 15 minutes (safe & free)
    - cron: "*/15 * * * *"

concurrency:
  group: quantum-tracker
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Requests
      run: pip install requests

    - name: Run Quantum Script
      run: python main.py

    - name: Save Memory (state.json)
      run: |
        git config --global user.name "tracker"
        git config --global user.email "tracker@email.com"
        git add state.json
        git commit -m "update prices" || echo "No changes"
        git push
