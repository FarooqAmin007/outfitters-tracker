name: GOD MODE AI HUNTER QUANTUM v4

on:
  schedule:
    - cron: '*/5 * * * *'

  workflow_dispatch:

jobs:
  run-bot:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install
      run: pip install -r requirements.txt

    - name: Run Hunter
      run: python main.py
